<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="醸造所向け・日報記録アプリ。ワンプッシュで作業内容と時間を自動記録。">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>醸造日報 - Brewery Daily Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header id="header">
      <div class="header-inner">
        <div class="header-left">
          <button id="btn-back" class="header-btn hidden" aria-label="戻る">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
        </div>
        <div class="header-center">
          <h1 id="header-title">🍺 醸造日報</h1>
        </div>
        <div class="header-right">
          <span id="current-time" class="header-time"></span>
        </div>
      </div>
    </header>

    <!-- 現在の作業ステータスバー -->
    <div id="current-status" class="status-bar hidden">
      <div class="status-indicator pulse"></div>
      <span id="status-text">作業中...</span>
      <span id="status-timer"></span>
    </div>

    <!-- メイン画面: 大項目選択 -->
    <main id="view-main" class="view active">
      <div class="category-grid" id="category-grid">
        <!-- JSで動的生成 -->
      </div>
      <div class="bottom-actions">
        <button id="btn-timeline" class="action-btn timeline-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          タイムライン
        </button>
        <button id="btn-dashboard" class="action-btn dashboard-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          分析
        </button>
        <button id="btn-end-work" class="action-btn end-work-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          退勤
        </button>
      </div>
    </main>

    <!-- 中項目選択画面 -->
    <main id="view-subcategory" class="view">
      <h2 id="subcategory-title" class="view-title"></h2>
      <div class="subcategory-grid" id="subcategory-grid">
        <!-- JSで動的生成 -->
      </div>
    </main>

    <!-- タイムライン画面 -->
    <main id="view-timeline" class="view">
      <div class="timeline-header">
        <h2 class="view-title">📋 本日のタイムライン</h2>
        <input type="date" id="timeline-date" class="date-picker">
      </div>
      <div id="timeline-list" class="timeline-list">
        <!-- JSで動的生成 -->
      </div>
    </main>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h3 class="modal-title">⏱️ 時間を修正</h3>
        <input type="hidden" id="edit-record-id">
        <div class="modal-field">
          <label for="edit-start-time">開始時間</label>
          <input type="time" id="edit-start-time" class="time-input">
        </div>
        <div class="modal-field">
          <label for="edit-end-time">終了時間</label>
          <input type="time" id="edit-end-time" class="time-input">
        </div>
        <div class="modal-actions">
          <button id="btn-edit-cancel" class="modal-btn cancel">キャンセル</button>
          <button id="btn-edit-save" class="modal-btn save">保存</button>
          <button id="btn-edit-delete" class="modal-btn delete">削除</button>
        </div>
      </div>
    </div>

    <!-- 退勤集計画面 -->
    <main id="view-summary" class="view">
      <h2 class="view-title">🏠 退勤サマリー</h2>
      <div id="summary-date" class="summary-date"></div>
      <div id="summary-total" class="summary-total"></div>
      <div id="summary-list" class="summary-list">
        <!-- JSで動的生成 -->
      </div>
      <div id="summary-timeline" class="summary-timeline">
        <!-- JSで動的生成 -->
      </div>
      <button id="btn-summary-close" class="action-btn end-work-btn" style="margin-top: 1.5rem;">
        閉じる
      </button>
    </main>

    <!-- 分析ダッシュボード画面 -->
    <main id="view-dashboard" class="view">
      <h2 class="view-title">📊 分析ダッシュボード</h2>
      <div class="dashboard-tabs">
        <button id="tab-all" class="dash-tab active" data-tab="all">全期間</button>
        <button id="tab-monthly" class="dash-tab" data-tab="monthly">月別</button>
      </div>
      <div id="month-selector" class="month-selector hidden">
        <input type="month" id="dashboard-month" class="date-picker">
      </div>
      <div id="dashboard-content" class="dashboard-content">
        <!-- JSで動的生成 -->
      </div>
    </main>

    <!-- 記録成功トースト -->
    <div id="toast" class="toast hidden">
      <span id="toast-message"></span>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
